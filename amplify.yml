# AWS Amplify — Vite SPA (`npm run build` → dist/).
# `next` must stay in devDependencies so Hosting does not treat this repo as
# Next.js SSR (which expects required-server-files.json in the artifact).
# If deploy still fails, run: aws amplify update-app --app-id <id> --platform WEB --region <r>
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
