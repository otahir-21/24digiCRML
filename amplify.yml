# AWS Amplify — Vite SPA (default `npm run build` → dist/)
# Override auto-detection as Next.js when deploying this app.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
