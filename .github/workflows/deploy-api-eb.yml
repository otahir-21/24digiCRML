# Deploy Node API from /server to AWS Elastic Beanstalk.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# Target application / environment (not sensitive — visible in the EB URL):
#   Override with repository VARIABLES (recommended) or SECRETS:
#     EB_APPLICATION_NAME   default: 24DIGIDashboard
#     EB_ENVIRONMENT_NAME   default: 24DIGIDashboard-env
# Optional secret:
#   AWS_REGION              default: ap-south-1
#
# IAM: allow elasticbeanstalk:* for the app/env, s3:GetObject on EB buckets, and
# typically elasticbeanstalk:UpdateEnvironment, CreateApplicationVersion, etc.

name: Deploy API to Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/deploy-api-eb.yml"
  workflow_dispatch:

concurrency:
  group: elastic-beanstalk-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      EB_APPLICATION_NAME: ${{ secrets.EB_APPLICATION_NAME || vars.EB_APPLICATION_NAME || '24DIGIDashboard' }}
      EB_ENVIRONMENT_NAME: ${{ secrets.EB_ENVIRONMENT_NAME || vars.EB_ENVIRONMENT_NAME || '24DIGIDashboard-env' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::error::Set repository secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          echo "Elastic Beanstalk target: application=$EB_APPLICATION_NAME environment=$EB_ENVIRONMENT_NAME"

      # Zip must have package.json and Procfile at the *root* of the archive — not server/package.json.
      - name: Create deployment package
        run: |
          cd server
          zip -r ../api.zip . \
            -x "node_modules/*" \
            -x ".env*" \
            -x "*.log" \
            -x ".git/*"

      - name: Verify EB bundle root layout
        run: |
          unzip -l api.zip | head -40
          if ! zipinfo -1 api.zip | grep -qx 'package.json'; then
            echo "ERROR: package.json must be at zip root, not inside a subfolder."
            echo "From repo root: cd server && zip -r ../api.zip ."
            exit 1
          fi

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          application_name: ${{ env.EB_APPLICATION_NAME }}
          environment_name: ${{ env.EB_ENVIRONMENT_NAME }}
          version_label: api-${{ github.sha }}-${{ github.run_attempt }}
          use_existing_version_if_available: true
          deployment_package: api.zip
          wait_for_deployment: true
